name: USFQ Offer Scraper

# DISABLED: scraping runs locally via MCP / Selenium (see offer-scraper/MCP_SCRAPING.md).
# GitHub Actions cannot maintain USFQ Microsoft SSO sessions.

on:
  workflow_dispatch:
    inputs:
      period:
        description: 'Period label (e.g. "Segundo Semestre 2025/2026")'
        required: false
        default: ''
      period_code:
        description: 'Period code (e.g. 202530)'
        required: false
        default: ''

jobs:
  scrape:
    if: false
    name: Scrape course offer
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      USFQ_USERNAME:        ${{ secrets.USFQ_USERNAME }}
      USFQ_PASSWORD:        ${{ secrets.USFQ_PASSWORD }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PERIOD:               ${{ github.event.inputs.period || '' }}
      PERIOD_CODE:          ${{ github.event.inputs.period_code || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: offer-scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r offer-scraper/requirements.txt

      - name: Install Playwright Chromium browser
        run: python -m playwright install --with-deps chromium

      - name: Derive period label and code if not supplied
        id: period
        run: |
          if [ -z "$PERIOD" ]; then
            MONTH=$(date +%-m)
            YEAR=$(date +%Y)
            if [ "$MONTH" -ge 1 ] && [ "$MONTH" -le 4 ]; then
              echo "value=Primer Semestre ${YEAR}/$((YEAR+1))" >> $GITHUB_OUTPUT
              echo "code=${YEAR}10" >> $GITHUB_OUTPUT
            elif [ "$MONTH" -ge 5 ] && [ "$MONTH" -le 7 ]; then
              echo "value=Verano ${YEAR}/$((YEAR+1))" >> $GITHUB_OUTPUT
              echo "code=${YEAR}30" >> $GITHUB_OUTPUT
            else
              echo "value=Segundo Semestre ${YEAR}/$((YEAR+1))" >> $GITHUB_OUTPUT
              echo "code=${YEAR}20" >> $GITHUB_OUTPUT
            fi
          else
            echo "value=$PERIOD" >> $GITHUB_OUTPUT
            if [ -n "$PERIOD_CODE" ]; then
              echo "code=$PERIOD_CODE" >> $GITHUB_OUTPUT
            else
              echo "code=202530" >> $GITHUB_OUTPUT
            fi
          fi
          if [ -n "$PERIOD_CODE" ] && [ -z "$PERIOD" ]; then
            echo "code=$PERIOD_CODE" >> $GITHUB_OUTPUT
          fi

      - name: Run offer scraper
        working-directory: offer-scraper
        env:
          PERIOD: ${{ steps.period.outputs.value }}
          PERIOD_CODE: ${{ steps.period.outputs.code }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scrape.py scrape

      - name: Upload scraper log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log
          path: offer-scraper/*.log
          if-no-files-found: ignore
          retention-days: 7
