name: USFQ Offer Rollover

# DISABLED: use local scraper (offer-scraper/MCP_SCRAPING.md).

on:
  workflow_dispatch:
    inputs:
      period_code:
        description: 'New period code (e.g. 202610)'
        required: true
        default: '202610'
      period:
        description: 'New period label'
        required: true
        default: 'Primer Semestre 2026/2027'

jobs:
  rollover:
    if: false
    name: Rollover course offer
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      USFQ_USERNAME:        ${{ secrets.USFQ_USERNAME }}
      USFQ_PASSWORD:        ${{ secrets.USFQ_PASSWORD }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: offer-scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r offer-scraper/requirements.txt

      - name: Install Playwright Chromium browser
        run: python -m playwright install --with-deps chromium

      - name: Run period rollover
        working-directory: offer-scraper
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python scrape.py rollover \
            --period-code "${{ github.event.inputs.period_code }}" \
            --period "${{ github.event.inputs.period }}" \
            --yes
